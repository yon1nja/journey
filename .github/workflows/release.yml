name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version from Cargo.toml
        id: version
        run: echo "version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')" >> "$GITHUB_OUTPUT"
      - name: Check if tag exists
        id: check
        run: |
          if git ls-remote --tags origin "v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.tag_exists == 'false'
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../journey-${{ matrix.target }}.tar.gz journey
      - uses: actions/upload-artifact@v4
        with:
          name: journey-${{ matrix.target }}
          path: journey-${{ matrix.target }}.tar.gz

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create tag
        run: |
          git tag "v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.check-version.outputs.version }}" \
            --title "v${{ needs.check-version.outputs.version }}" \
            --generate-notes \
            journey-*.tar.gz

  homebrew:
    needs: [check-version, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Compute checksums
        id: sha
        run: |
          echo "x86_64_mac=$(shasum -a 256 journey-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "aarch64_mac=$(shasum -a 256 journey-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x86_64_linux=$(shasum -a 256 journey-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
      - name: Update Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          FORMULA=$(cat <<RUBY
          class Journey < Formula
            desc "Context persistence for engineering efforts"
            homepage "https://github.com/yon1nja/journey"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/yon1nja/journey/releases/download/v${VERSION}/journey-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.aarch64_mac }}"
              else
                url "https://github.com/yon1nja/journey/releases/download/v${VERSION}/journey-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.x86_64_mac }}"
              end
            end

            on_linux do
              url "https://github.com/yon1nja/journey/releases/download/v${VERSION}/journey-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${{ steps.sha.outputs.x86_64_linux }}"
            end

            def install
              bin.install "journey"
            end
          end
          RUBY
          )

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/yon1nja/homebrew-tap.git" tap
          echo "$FORMULA" > tap/Formula/journey.rb
          cd tap
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Formula/journey.rb
          git commit -m "journey ${VERSION}"
          git push
